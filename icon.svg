<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Emerald Gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Subtle Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Maskable Background (Solid Fill) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Glowing Backplate (Within Safe Zone) -->
  <circle cx="256" cy="256" r="140" fill="url(#emeraldGrad)" opacity="0.12" filter="url(#glow)" />

  <!-- Main Emblem Wrapper -->
  <g filter="url(#shadow)">
    <!-- Outer Circle Ring -->
    <circle cx="256" cy="256" r="120" fill="none" stroke="url(#emeraldGrad)" stroke-width="6" stroke-dasharray="8 6" opacity="0.5" />
    <circle cx="256" cy="256" r="110" fill="none" stroke="url(#emeraldGrad)" stroke-width="2" opacity="0.3" />

    <!-- Stylized Palm/Sawit Leaf + Audit Checkmark Concept -->
    <!-- Stem -->
    <path d="M 220,350 Q 256,290 256,150" fill="none" stroke="url(#emeraldGrad)" stroke-width="10" stroke-linecap="round" />

    <!-- Leaf Fronds (Symmetrical and Sleek) -->
    <!-- Left Side Fronds -->
    <path d="M 256,170 Q 180,180 160,210 Q 210,210 256,190" fill="url(#emeraldGrad)" />
    <path d="M 256,210 Q 170,230 150,265 Q 200,260 256,230" fill="url(#emeraldGrad)" />
    <path d="M 256,250 Q 165,280 145,315 Q 195,305 256,270" fill="url(#emeraldGrad)" />

    <!-- Right Side Fronds (Representing the Audit Checkmark upward swing) -->
    <path d="M 256,170 Q 332,180 352,210 Q 302,210 256,190" fill="url(#emeraldGrad)" />
    <path d="M 256,210 Q 342,230 362,265 Q 312,260 256,230" fill="url(#emeraldGrad)" />
    <!-- This lower-right branch extends further to act as the hook/tick of the checkmark -->
    <path d="M 256,250 Q 347,280 367,315 Q 317,305 256,270" fill="url(#emeraldGrad)" />
    
    <!-- Audit Checklist Shield / Badge Icon at the top-right -->
    <g transform="translate(320, 160)">
      <!-- Glowing check badge -->
      <circle cx="0" cy="0" r="28" fill="#1e293b" stroke="url(#emeraldGrad)" stroke-width="4" />
      <path d="M -10,-2 L -3,6 L 10,-5" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>
